<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ND-OSINT | Scanner GPS</title>
    
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --neon: #00ffcc; --dark: #050505; --red: #ff3333; }
        body { 
            background-color: var(--dark); color: white; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        h1 { 
            color: var(--neon); text-transform: uppercase; 
            border-bottom: 2px solid var(--neon); padding-bottom: 10px; text-align: center; 
        }
        .panel { 
            background: rgba(0, 255, 204, 0.05); border: 1px solid var(--neon); 
            padding: 20px; border-radius: 8px; width: 100%; max-width: 500px; text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); margin-bottom: 20px;
        }
        input[type="file"] { display: none; }
        .btn { 
            background: var(--neon); color: black; font-weight: bold; padding: 12px 20px; 
            border: none; cursor: pointer; text-transform: uppercase; display: inline-block; margin-top: 10px;
            transition: 0.3s; width: 80%;
        }
        .btn:hover { background: white; box-shadow: 0 0 15px var(--neon); }
        
        #result-text { 
            margin-top: 20px; font-size: 14px; line-height: 1.6; color: #ccc; 
            text-align: left; background: #000; padding: 15px; border-left: 3px solid var(--neon);
            word-wrap: break-word;
        }
        .highlight { color: var(--neon); font-weight: bold; }
        .place-name { color: #ffcc00; font-weight: bold; text-transform: uppercase; }
        .error { color: var(--red); font-weight: bold; }
        
        #map { 
            height: 350px; width: 100%; max-width: 500px; 
            border: 1px solid var(--neon); display: none; border-radius: 8px; margin-top: 10px; 
        }
    </style>
</head>
<body>

    <h1>ND-OSINT // Scanner Géospatial</h1>

    <div class="panel">
        <p>Chargez une image source pour extraire sa localisation (ville, quartier, rue).</p>
        
        <label for="imageInput" class="btn">INSERER UNE PHOTO</label>
        <input type="file" id="imageInput" accept="image/jpeg, image/png, image/heic">
        
        <div id="result-text">[SYSTEM] En attente d'un fichier cible...</div>
    </div>

    <div id="map"></div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const resultText = document.getElementById('result-text');
        const mapDiv = document.getElementById('map');
        let map; 
        let marker; 

        imageInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            resultText.innerHTML = "[SYSTEM] Analyse et recherche de l'adresse en cours...";
            mapDiv.style.display = 'none'; 

            try {
                // ÉTAPE 1 : Extraction des coordonnées GPS de la photo
                const data = await exifr.parse(file);
                
                if (data && data.latitude && data.longitude) {
                    const lat = data.latitude.toFixed(6);
                    const lon = data.longitude.toFixed(6);
                    
                    // ÉTAPE 2 : Recherche du nom de la rue/ville avec OpenStreetMap
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const locationData = await response.json();
                    
                    const placeName = locationData.display_name || "Adresse introuvable dans la base de données.";
                    
                    // Affichage des résultats en texte
                    resultText.innerHTML = `
                        [+] <b>CIBLE VÉROUILLÉE</b><br><br>
                        [+] <b>Lieu exact :</b> <span class="place-name">${placeName}</span><br><br>
                        [+] <b>Appareil :</b> <span class="highlight">${data.Make || 'Inconnu'} ${data.Model || ''}</span><br>
                        [+] <b>Date :</b> <span class="highlight">${data.DateTimeOriginal ? data.DateTimeOriginal.toLocaleDateString() : 'Non spécifiée'}</span><br>
                        [+] <b>Coordonnées GPS :</b> ${lat}, ${lon}
                    `;

                    // ÉTAPE 3 : Affichage sur la carte interactive
                    mapDiv.style.display = 'block';

                    if (!map) {
                        map = L.map('map').setView([lat, lon], 16);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap'
                        }).addTo(map);
                    } else {
                        map.setView([lat, lon], 16);
                    }

                    if (marker) {
                        marker.setLatLng([lat, lon]);
                    } else {
                        marker = L.marker([lat, lon]).addTo(map);
                    }
                    marker.bindPopup(`<b>LOCALISATION CONFIRMÉE</b><br>${placeName}`).openPopup();

                } else {
                    resultText.innerHTML = `<span class="error">[-] Échec : La photo ne contient aucune donnée de localisation. (Vérifiez que le GPS était activé lors de la prise de vue).</span>`;
                }
            } catch (error) {
                console.error(error);
                resultText.innerHTML = `<span class="error">[-] Erreur critique lors de la lecture du fichier.</span>`;
            }
        });
    </script>
</body>
</html>
